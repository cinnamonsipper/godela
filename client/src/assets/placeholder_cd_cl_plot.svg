<?xml version="1.0" encoding="UTF-8"?>
<svg width="380" height="220" viewBox="0 0 380 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0d1017" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <!-- Background with grid -->
  <rect x="0" y="0" width="380" height="220" rx="4" fill="url(#bgGradient)"/>
  
  <!-- Grid lines -->
  <g opacity="0.1">
    <path d="M 60 20 V 180" stroke="#ffffff" stroke-width="1"/>
    <path d="M 100 20 V 180" stroke="#ffffff" stroke-width="1"/>
    <path d="M 140 20 V 180" stroke="#ffffff" stroke-width="1"/>
    <path d="M 180 20 V 180" stroke="#ffffff" stroke-width="1"/>
    <path d="M 220 20 V 180" stroke="#ffffff" stroke-width="1"/>
    <path d="M 260 20 V 180" stroke="#ffffff" stroke-width="1"/>
    <path d="M 300 20 V 180" stroke="#ffffff" stroke-width="1"/>
    <path d="M 340 20 V 180" stroke="#ffffff" stroke-width="1"/>
    
    <path d="M 60 180 H 340" stroke="#ffffff" stroke-width="1"/>
    <path d="M 60 140 H 340" stroke="#ffffff" stroke-width="1"/>
    <path d="M 60 100 H 340" stroke="#ffffff" stroke-width="1"/>
    <path d="M 60 60 H 340" stroke="#ffffff" stroke-width="1"/>
    <path d="M 60 20 H 340" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- Axes and labels -->
  <path d="M 60 20 V 180 H 340" stroke="#94a3b8" stroke-width="1.5"/>
  
  <text x="200" y="205" fill="#cbd5e1" font-family="Arial" font-size="12" text-anchor="middle">Drag Coefficient (CD)</text>
  <text x="30" y="100" fill="#cbd5e1" font-family="Arial" font-size="12" text-anchor="middle" transform="rotate(-90, 30, 100)">Lift Coefficient (CL)</text>
  
  <!-- X-axis ticks and labels -->
  <g>
    <path d="M 60 180 V 185" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="60" y="195" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">0.000</text>
    
    <path d="M 100 180 V 185" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="100" y="195" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">0.005</text>
    
    <path d="M 140 180 V 185" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="140" y="195" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">0.010</text>
    
    <path d="M 180 180 V 185" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="180" y="195" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">0.015</text>
    
    <path d="M 220 180 V 185" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="220" y="195" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">0.020</text>
    
    <path d="M 260 180 V 185" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="260" y="195" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">0.025</text>
    
    <path d="M 300 180 V 185" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="300" y="195" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">0.030</text>
    
    <path d="M 340 180 V 185" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="340" y="195" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">0.035</text>
  </g>
  
  <!-- Y-axis ticks and labels -->
  <g>
    <path d="M 55 180 H 60" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="50" y="183" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="end">0.0</text>
    
    <path d="M 55 140 H 60" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="50" y="143" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="end">0.5</text>
    
    <path d="M 55 100 H 60" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="50" y="103" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="end">1.0</text>
    
    <path d="M 55 60 H 60" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="50" y="63" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="end">1.5</text>
    
    <path d="M 55 20 H 60" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="50" y="23" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="end">2.0</text>
  </g>
  
  <!-- Data points for drag polar curve -->
  <circle cx="70" cy="180" r="3" fill="#06b6d4"/>
  <circle cx="72" cy="160" r="3" fill="#06b6d4"/>
  <circle cx="80" cy="140" r="3" fill="#06b6d4"/>
  <circle cx="95" cy="120" r="3" fill="#06b6d4"/>
  <circle cx="115" cy="100" r="3" fill="#06b6d4"/>
  <circle cx="140" cy="80" r="3" fill="#06b6d4"/>
  <circle cx="170" cy="60" r="3" fill="#06b6d4"/>
  <circle cx="210" cy="40" r="3" fill="#06b6d4"/>
  <circle cx="260" cy="25" r="3" fill="#06b6d4"/>
  
  <!-- Current data point highlighted -->
  <circle cx="115" cy="100" r="5" stroke="#38bdf8" stroke-width="2" fill="none"/>
  
  <!-- Drag polar curve (quadratic relationship) -->
  <path d="M 70 180 Q 80 160, 95 120 T 140 80 T 210 40 T 320 25" 
        stroke="url(#lineGradient)" stroke-width="2" fill="none"/>
  
  <!-- Curve theoretical model -->
  <path d="M 70 180 Q 90 150, 120 120 T 180 75 T 260 45 T 360 30" 
        stroke="#64748b" stroke-width="1" stroke-dasharray="3,2" fill="none"/>
  
  <!-- Legend -->
  <g transform="translate(200, 40)">
    <rect x="0" y="0" width="120" height="40" rx="3" fill="#1A2030" opacity="0.7"/>
    
    <line x1="10" y1="15" x2="30" y2="15" stroke="url(#lineGradient)" stroke-width="2"/>
    <text x="40" y="18" fill="#e2e8f0" font-family="Arial" font-size="9">ML Model</text>
    
    <line x1="10" y1="30" x2="30" y2="30" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="40" y="33" fill="#e2e8f0" font-family="Arial" font-size="9">Theory</text>
  </g>
  
  <!-- Title -->
  <text x="20" y="20" fill="#f1f5f9" font-family="Arial" font-size="12" font-weight="bold">Drag Polar (CL vs. CD)</text>
</svg>