<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="300" height="160" viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGlowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#54D1FF" />
      <stop offset="50%" stop-color="#9F6FFF" />
      <stop offset="100%" stop-color="#FF6AD5" />
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background halo effect -->
  <ellipse cx="120" cy="80" rx="60" ry="40" fill="url(#logoGlowGradient)" opacity="0.07" filter="blur(20px)" />
  
  <!-- Double cone / hourglass wireframe structure -->
  <g transform="translate(120, 80) scale(0.85)" stroke="url(#logoGlowGradient)" stroke-width="1.5" fill="none" filter="url(#glow)">
    <!-- Top cone structure -->
    <path d="M 0,-60 L 35,-30 L 50,-10 L 55,0 M 0,-60 L -35,-30 L -50,-10 L -55,0" />
    <path d="M 0,-60 L 15,-40 L 30,-20 L 40,-5 M 0,-60 L -15,-40 L -30,-20 L -40,-5" />
    <path d="M 0,-60 L 25,-35 L 40,-15 L 48,-3 M 0,-60 L -25,-35 L -40,-15 L -48,-3" />
    
    <!-- Middle horizontal line -->
    <path d="M -55,0 L 55,0" stroke-width="2" />
    
    <!-- Bottom cone structure -->
    <path d="M 0,60 L 35,30 L 50,10 L 55,0 M 0,60 L -35,30 L -50,10 L -55,0" />
    <path d="M 0,60 L 15,40 L 30,20 L 40,5 M 0,60 L -15,40 L -30,20 L -40,5" />
    <path d="M 0,60 L 25,35 L 40,15 L 48,3 M 0,60 L -25,35 L -40,15 L -48,3" />
    
    <!-- Elliptical rings -->
    <ellipse cx="0" cy="0" rx="55" ry="12" />
    <ellipse cx="0" cy="-20" rx="40" ry="10" />
    <ellipse cx="0" cy="20" rx="40" ry="10" />
    <ellipse cx="0" cy="-40" rx="25" ry="7" />
    <ellipse cx="0" cy="40" rx="25" ry="7" />
    
    <!-- Vertical line -->
    <line x1="0" y1="-60" x2="0" y2="60" />
  </g>
  
  <!-- Text part -->
  <g transform="translate(180, 80)" fill="white">
    <text x="0" y="0" font-family="Arial, sans-serif" font-weight="bold" font-size="24" letter-spacing="1">
      GODELA
    </text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-weight="300" font-size="14" letter-spacing="0.5" opacity="0.8">
      PHYSICS × AI
    </text>
  </g>
</svg>