<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0d1017" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="inputNodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="hiddenNodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="outputNodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="400" height="300" rx="6" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="20" y="30" fill="#f1f5f9" font-family="Arial" font-size="14" font-weight="bold">Neural Network Architecture</text>
  <text x="20" y="50" fill="#94a3b8" font-family="Arial" font-size="11">Optimized for Airfoil Performance Prediction</text>
  
  <!-- Layer Labels -->
  <text x="80" y="80" fill="#cbd5e1" font-family="Arial" font-size="12" text-anchor="middle">Input Layer</text>
  <text x="200" y="80" fill="#cbd5e1" font-family="Arial" font-size="12" text-anchor="middle">Hidden Layer</text>
  <text x="320" y="80" fill="#cbd5e1" font-family="Arial" font-size="12" text-anchor="middle">Output Layer</text>
  
  <!-- Input Layer -->
  <g>
    <circle cx="80" cy="130" r="15" fill="url(#inputNodeGradient)" filter="url(#glow)"/>
    <text x="80" y="135" fill="white" font-family="Arial" font-size="10" text-anchor="middle">AoA</text>
    
    <circle cx="80" cy="170" r="15" fill="url(#inputNodeGradient)" filter="url(#glow)"/>
    <text x="80" y="175" fill="white" font-family="Arial" font-size="10" text-anchor="middle">t/c</text>
    
    <circle cx="80" cy="210" r="15" fill="url(#inputNodeGradient)" filter="url(#glow)"/>
    <text x="80" y="215" fill="white" font-family="Arial" font-size="10" text-anchor="middle">Re</text>
  </g>
  
  <!-- Hidden Layer -->
  <g>
    <circle cx="200" cy="110" r="15" fill="url(#hiddenNodeGradient)" filter="url(#glow)"/>
    <text x="200" y="115" fill="white" font-family="Arial" font-size="10" text-anchor="middle">N₁</text>
    
    <circle cx="200" cy="150" r="15" fill="url(#hiddenNodeGradient)" filter="url(#glow)"/>
    <text x="200" y="155" fill="white" font-family="Arial" font-size="10" text-anchor="middle">N₂</text>
    
    <circle cx="200" cy="190" r="15" fill="url(#hiddenNodeGradient)" filter="url(#glow)"/>
    <text x="200" y="195" fill="white" font-family="Arial" font-size="10" text-anchor="middle">N₃</text>
    
    <circle cx="200" cy="230" r="15" fill="url(#hiddenNodeGradient)" filter="url(#glow)"/>
    <text x="200" y="235" fill="white" font-family="Arial" font-size="10" text-anchor="middle">N₄</text>
  </g>
  
  <!-- Output Layer -->
  <g>
    <circle cx="320" cy="150" r="15" fill="url(#outputNodeGradient)" filter="url(#glow)"/>
    <text x="320" y="155" fill="white" font-family="Arial" font-size="10" text-anchor="middle">CL</text>
    
    <circle cx="320" cy="190" r="15" fill="url(#outputNodeGradient)" filter="url(#glow)"/>
    <text x="320" y="195" fill="white" font-family="Arial" font-size="10" text-anchor="middle">CD</text>
  </g>
  
  <!-- Connections: Input to Hidden -->
  <g opacity="0.5">
    <!-- From input 1 -->
    <path d="M 95 130 L 185 110" stroke="#4f46e5" stroke-width="1.2"/>
    <path d="M 95 130 L 185 150" stroke="#4f46e5" stroke-width="1.2"/>
    <path d="M 95 130 L 185 190" stroke="#4f46e5" stroke-width="1.2"/>
    <path d="M 95 130 L 185 230" stroke="#4f46e5" stroke-width="1.2"/>
    
    <!-- From input 2 -->
    <path d="M 95 170 L 185 110" stroke="#4f46e5" stroke-width="1.2"/>
    <path d="M 95 170 L 185 150" stroke="#4f46e5" stroke-width="1.2"/>
    <path d="M 95 170 L 185 190" stroke="#4f46e5" stroke-width="1.2"/>
    <path d="M 95 170 L 185 230" stroke="#4f46e5" stroke-width="1.2"/>
    
    <!-- From input 3 -->
    <path d="M 95 210 L 185 110" stroke="#4f46e5" stroke-width="1.2"/>
    <path d="M 95 210 L 185 150" stroke="#4f46e5" stroke-width="1.2"/>
    <path d="M 95 210 L 185 190" stroke="#4f46e5" stroke-width="1.2"/>
    <path d="M 95 210 L 185 230" stroke="#4f46e5" stroke-width="1.2"/>
  </g>
  
  <!-- Connections: Hidden to Output -->
  <g opacity="0.5">
    <!-- To output 1 -->
    <path d="M 215 110 L 305 150" stroke="#06b6d4" stroke-width="1.2"/>
    <path d="M 215 150 L 305 150" stroke="#06b6d4" stroke-width="1.2"/>
    <path d="M 215 190 L 305 150" stroke="#06b6d4" stroke-width="1.2"/>
    <path d="M 215 230 L 305 150" stroke="#06b6d4" stroke-width="1.2"/>
    
    <!-- To output 2 -->
    <path d="M 215 110 L 305 190" stroke="#06b6d4" stroke-width="1.2"/>
    <path d="M 215 150 L 305 190" stroke="#06b6d4" stroke-width="1.2"/>
    <path d="M 215 190 L 305 190" stroke="#06b6d4" stroke-width="1.2"/>
    <path d="M 215 230 L 305 190" stroke="#06b6d4" stroke-width="1.2"/>
  </g>
  
  <!-- Legend -->
  <g transform="translate(20, 260)">
    <rect x="0" y="0" width="360" height="30" rx="4" fill="#1A2030" opacity="0.7"/>
    <text x="10" y="20" fill="#94a3b8" font-family="Arial" font-size="10" font-weight="bold">Architecture:</text>
    <text x="90" y="20" fill="#e2e8f0" font-family="Arial" font-size="10">Feedforward • ReLU Activation • Adam Optimizer • MSE Loss</text>
  </g>
  
  <!-- Badge -->
  <g transform="translate(300, 30)">
    <rect x="0" y="0" width="80" height="20" rx="10" fill="#4f46e5" opacity="0.8"/>
    <text x="40" y="14" fill="white" font-family="Arial" font-size="10" text-anchor="middle" font-weight="bold">AI-OPTIMIZED</text>
  </g>
</svg>