<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGlowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#54D1FF" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background halo effect -->
  <ellipse cx="20" cy="20" rx="15" ry="10" fill="url(#logoGlowGradient)" opacity="0.07" filter="blur(5px)" />
  
  <!-- Double cone / hourglass wireframe structure -->
  <g transform="translate(20, 20)" stroke="url(#logoGlowGradient)" stroke-width="0.7" fill="none" filter="url(#glow)">
    <!-- Top cone structure -->
    <path d="M 0,-15 L 8.75,-7.5 L 12.5,-2.5 L 13.75,0 M 0,-15 L -8.75,-7.5 L -12.5,-2.5 L -13.75,0" />
    <path d="M 0,-15 L 3.75,-10 L 7.5,-5 L 10,-1.25 M 0,-15 L -3.75,-10 L -7.5,-5 L -10,-1.25" />
    <path d="M 0,-15 L 6.25,-8.75 L 10,-3.75 L 12,-0.75 M 0,-15 L -6.25,-8.75 L -10,-3.75 L -12,-0.75" />
    
    <!-- Middle horizontal line -->
    <path d="M -13.75,0 L 13.75,0" stroke-width="0.8" />
    
    <!-- Bottom cone structure -->
    <path d="M 0,15 L 8.75,7.5 L 12.5,2.5 L 13.75,0 M 0,15 L -8.75,7.5 L -12.5,2.5 L -13.75,0" />
    <path d="M 0,15 L 3.75,10 L 7.5,5 L 10,1.25 M 0,15 L -3.75,10 L -7.5,5 L -10,1.25" />
    <path d="M 0,15 L 6.25,8.75 L 10,3.75 L 12,0.75 M 0,15 L -6.25,8.75 L -10,3.75 L -12,0.75" />
    
    <!-- Elliptical rings -->
    <ellipse cx="0" cy="0" rx="13.75" ry="3" />
    <ellipse cx="0" cy="-5" rx="10" ry="2.5" />
    <ellipse cx="0" cy="5" rx="10" ry="2.5" />
    <ellipse cx="0" cy="-10" rx="6.25" ry="1.75" />
    <ellipse cx="0" cy="10" rx="6.25" ry="1.75" />
    
    <!-- Vertical line -->
    <line x1="0" y1="-15" x2="0" y2="15" />
  </g>
</svg>